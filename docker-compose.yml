services:
  app:
    container_name: yukima
    user: ${UID_GID}
    build:
      context: .
      dockerfile: ./Dockerfile
    command: bundle exec jekyll serve --host 0.0.0.0 --force_polling --incremental --livereload
    volumes:
      - $PWD:/srv/jekyll
    ports:
      - 4000:4000
      - 35729:35729
