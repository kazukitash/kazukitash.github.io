<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title }}</title>
    <link rel="shortcut icon" href="/assets/images/favicon.ico" />
    <link rel="stylesheet" href="/assets/css/post.css" />
    <link rel="stylesheet" href="/assets/css/tomorrow-night-blue.css" />
    <link rel="stylesheet" href="/assets/css/highlightjs-copy.min.css" />
    <script src="/assets/js/terraform.js"></script>
    <script src="/assets/js/highlight.min.js"></script>
    <script src="/assets/js/highlightjs-copy.min.js"></script>
    <script src="/assets/js/mermaid.min.js"></script>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-HP3K9SB93C"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-HP3K9SB93C");
    </script>
  </head>
  <body>
    <script>
      hljs.addPlugin(new CopyButtonPlugin());
      hljs.registerLanguage("terraform", window.hljsDefineTerraform);
      hljs.highlightAll();
      document.addEventListener("DOMContentLoaded", function () {
        mermaid.initialize({
          startOnLoad: true,
          theme: "neutral",
        });
        window.mermaid.init(
          undefined,
          document.querySelectorAll(".language-mermaid")
        );
      });
    </script>
    {% include header.html %}
    <article class="content post">
      <div><a href="/index.html">←</a></div>
      <h1>{{ page.title }}</h1>
      <div class="post__date">{{ page.date | date: "%Y.%m.%d" }}</div>
      <div class="post__share">
        <a
          href="https://twitter.com/share?ref_src=twsrc%5Etfw"
          class="twitter-share-button"
          data-show-count="false"
          >Tweet</a
        >
        <script
          async
          src="https://platform.twitter.com/widgets.js"
          charset="utf-8"
        ></script>
        <a
          href="https://b.hatena.ne.jp/entry/"
          class="hatena-bookmark-button"
          data-hatena-bookmark-layout="basic-label"
          data-hatena-bookmark-lang="ja"
          title="このエントリーをはてなブックマークに追加"
          ><img
            src="https://b.st-hatena.com/images/v4/public/entry-button/button-only@2x.png"
            alt="このエントリーをはてなブックマークに追加"
            width="20"
            height="20"
            style="border: none"
        /></a>
        <script
          type="text/javascript"
          src="https://b.st-hatena.com/js/bookmark_button.js"
          charset="utf-8"
          async="async"
        ></script>
      </div>
      {{ content }}
    </article>
    {% include footer.html %}
  </body>
</html>
